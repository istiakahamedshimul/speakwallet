name: Speakwallet
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # --- SPEAKWALLET CUSTOM DEPENDENCIES ---

  # Firebase Core & Backend Services
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  firebase_database: ^11.3.10

  # Networking
  http: ^1.2.0

  # Audio / Utilities
  intl: ^0.19.0
  record: ^6.2.0
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  sms_autofill: ^2.4.1
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png