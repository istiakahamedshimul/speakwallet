allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")

    // THE TARGETED FIX: Only spoof the flutter object for the broken plugin
    if (project.name == "record_android") {
        project.ext.flutter = [
                compileSdkVersion: 34,
                minSdkVersion: 24,
                targetSdkVersion: 34,
                ndkVersion: "25.1.8937393"
        ]
    }
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}